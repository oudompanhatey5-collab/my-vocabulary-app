<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហ្គេមទាយពាក្យ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eef2f3; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 16px; cursor: pointer; }
        #msg { margin-top: 15px; font-weight: bold; }
        .score { font-size: 20px; color: #007bff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>ហ្គេមទាយពាក្យ 🧠</h2>
        <div class="score">ពិន្ទុ៖ <span id="score">0</span></div>
        <p>តើពាក្យនេះជាភាសាអង់គ្លេសសរសេរដូចម្តេច?</p>
        <h1 id="khmerWord" style="color: #d9534f;">...</h1>
        
        <input type="text" id="userInput" placeholder="វាយចម្លើយនៅទីនេះ..." autocomplete="off">
        <br>
        <button onclick="check()">បញ្ជូនចម្លើយ</button>
        <div id="msg"></div>
    </div>

    <script>
        const quizData = [
            { km: "សួស្តី", en: "hello" },
            { km: "សាលារៀន", en: "school" },
            { km: "មិត្តភក្តិ", en: "friend" },
            { km: "សៀវភៅ", en: "book" },
            { km: "គ្រូ", en: "teacher" }
        ];

        let currentIndex = 0;
        let score = 0;

        function loadQuiz() {
            document.getElementById('khmerWord').innerText = quizData[currentIndex].km;
            document.getElementById('userInput').value = "";
            document.getElementById('msg').innerText = "";
        }

        function check() {
            let answer = document.getElementById('userInput').value.trim().toLowerCase();
            if (answer === quizData[currentIndex].en) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('msg').innerText = "✅ ត្រឹមត្រូវ! ពូកែណាស់!";
                document.getElementById('msg').style.color = "green";
                
                // ទៅពាក្យបន្ទាប់ក្រោយ ១ វិនាទី
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % quizData.length;
                    loadQuiz();
                }, 1000);
            } else {
                document.getElementById('msg').innerText = "❌ ខុសហើយ! ព្យាយាមម្ដងទៀត";
                document.getElementById('msg').style.color = "red";
            }
        }

        loadQuiz();
    </script>
</body>
</html>
