        { km: "ក្លិន", en: "Smell", fr: "Odeur", zh: "味道" },
        { km: "រសជាតិ", en: "Taste", fr: "Goût", zh: "口味" },
        { km: "អារម្មណ៍", en: "Feeling", fr: "Sentiment", zh: "情绪" },
        { km: "ជីវិត", en: "Life", fr: "Vie", zh: "生活" }
         // ចំណុចនេះ អ្នកអាចចម្លងពាក្យពី Excel មកដាក់បន្តបានយ៉ាងងាយ
    ];

    let currentLang = 'km';

    function render(lang) {
        currentLang = lang;
        const container = document.getElementById('wordList');
        container.innerHTML = "";
        
        allWords.forEach(item => {
            let main = item[lang];
            let sub = (lang === 'km') ? `${item.en} | ${item.zh}` : item.km;
            let speechCode = (lang === 'en') ? 'en-US' : (lang === 'fr' ? 'fr-FR' : (lang === 'zh' ? 'zh-CN' : null));
            
            let btn = speechCode ? `<button class="voice-btn" onclick="say('${main}', '${speechCode}')">🔊</button>` : "";

            container.innerHTML += `
                <div class="word-card">
                    <div class="word-info">
                        <h4>${main}</h4>
                        <p>${sub}</p>
                    </div>
                    ${btn}
                </div>
            `;
        });
    }

    function say(text, lang) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        window.speechSynthesis.speak(msg);
    }

    function searchWord() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('word-card');
        
        for (let i = 0; i < cards.length; i++) {
            let text = cards[i].innerText.toLowerCase();
            cards[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function changeLang(lang, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        btn.classList.add('active-tab');
        render(lang);
    }

    render('km');
</script>

</body>
</html>
