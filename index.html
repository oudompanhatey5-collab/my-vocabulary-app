    let score = 0;
    let current;

    function next() {
        current = wordBank[Math.floor(Math.random() * wordBank.length)];
        document.getElementById('word-display').innerText = current.q;
        document.getElementById('userInput').value = "";
        document.getElementById('message').innerText = "";
    }

    function check() {
        let val = document.getElementById('userInput').value.trim().toLowerCase();
        let msg = document.getElementById('message');
        if (val === current.a.toLowerCase()) {
            score += 10;
            document.getElementById('score').innerText = score;
            msg.innerText = "✅ ត្រឹមត្រូវ!";
            msg.style.color = "green";
            setTimeout(next, 800);
        } else {
            msg.innerText = "❌ ព្យាយាមម្ដងទៀត";
            msg.style.color = "red";
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') check();
    });

    next();
